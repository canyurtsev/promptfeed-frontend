<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Agent Registry · PromptFeed</title>

  <!-- Design System -->
  <link href="css/styles.css" rel="stylesheet" />

  <!-- Icons (Lucide) -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    .registry-header {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-default);
      padding: 2rem 0;
    }

    .filter-bar {
      display: flex;
      gap: 10px;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border-muted);
      align-items: center;
    }

    .registry-list {
      margin-top: 1.5rem;
      border: 1px solid var(--border-default);
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg-canvas);
    }

    .registry-item {
      padding: 1rem 1.5rem;
      background: var(--bg-canvas);
      border-bottom: 1px solid var(--border-muted);
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      transition: background 0.15s;
    }

    .registry-item:hover {
      background: rgba(22, 27, 34, 0.4);
    }

    .registry-item:last-child {
      border-bottom: none;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .status--stable {
      background: var(--accent-green);
      box-shadow: 0 0 8px var(--accent-green);
    }

    .category-tabs {
      display: flex;
      gap: 1.5rem;
      margin-top: 1rem;
    }

    .tab-item {
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      padding-bottom: 8px;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab-item:hover {
      color: var(--text-white);
    }

    .tab-item.active {
      color: var(--text-white);
      border-color: #f78166;
      font-weight: 600;
    }

    .registry-search {
      background: var(--bg-canvas);
      border: 1px solid var(--border-default);
      border-radius: 6px;
      padding: 4px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      width: 300px;
      transition: border-color 0.2s;
    }

    .registry-search:focus-within {
      border-color: var(--accent-blue);
    }

    .registry-search input {
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-size: 13px;
      outline: none;
      width: 100%;
    }
  </style>
</head>

<body class="pf-main">

  <header class="pf-header"></header>

  <main class="pf-main">
    <div style="width: 100%;">
      <div class="registry-header">
        <div style="display: flex; justify-content: space-between; align-items: start;">
          <div>
            <h1 style="font-size: 1.75rem; margin-bottom: 8px;">Agentic Workforce Registry</h1>
            <p style="color: var(--text-secondary); font-size: 14px;">The source of truth for specialized AI agent
              behaviors, worker flows, and verified tool schemas.</p>
          </div>
          <div class="registry-search">
            <i data-lucide="search" size="14" style="color: var(--text-muted)"></i>
            <input id="agent-search" placeholder="Type to filter registry..." type="text" />
          </div>
        </div>

        <div class="category-tabs">
          <div class="tab-item active" data-cat="all">All Modules</div>
          <div class="tab-item" data-cat="agents">Autonomous Agents</div>
          <div class="tab-item" data-cat="tools">API Tools</div>
          <div class="tab-item" data-cat="logic">Deductive Logic</div>
          <div class="tab-item" data-cat="security">Security Audits</div>
        </div>
      </div>

      <div class="filter-bar">
        <div style="font-size: 12px; color: var(--text-muted); font-weight: 500;">
          <span id="result-count">0</span> verified architectural units found
        </div>
        <div style="margin-left: auto; display: flex; gap: 8px;">
          <button class="btn" style="font-size: 12px; padding: 4px 12px; border-radius: 6px;">Logic Type <i
              data-lucide="chevron-down" size="12"></i></button>
          <button class="btn" style="font-size: 12px; padding: 4px 12px; border-radius: 6px;">Provider <i
              data-lucide="chevron-down" size="12"></i></button>
        </div>
      </div>

      <div class="registry-list" id="registry-items">
        <!-- Generated dynamically via JS -->
      </div>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/state.js"></script>
  <script src="js/ui-components.js"></script>
  <script src="js/pages/skills.js"></script>
</body>
</body>

</html>
