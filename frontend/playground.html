<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Playground — PromptFeed</title>

  <!-- Design System -->
  <link href="css/styles.css" rel="stylesheet" />

  <!-- Icons (Lucide) -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      background-color: var(--bg-subtle);
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .ide-container {
      display: flex;
      flex: 1;
      min-height: 0;
      border-top: 1px solid var(--border-default);
    }

    .ide-sidebar {
      width: 48px;
      background: var(--bg-canvas);
      border-right: 1px solid var(--border-default);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem 0;
      gap: 1.5rem;
    }

    .ide-nav-item {
      color: var(--text-secondary);
      cursor: pointer;
      transition: color 0.2s;
    }

    .ide-nav-item:hover,
    .ide-nav-item.active {
      color: var(--text-white);
    }

    .ide-panel {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .panel-header {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-default);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 40px;
    }

    .panel-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .editor-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-canvas);
    }

    .editor-textarea {
      flex: 1;
      background: transparent;
      border: none;
      padding: 1.5rem;
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
      outline: none;
      resize: none;
    }

    .output-panel {
      width: 400px;
      border-left: 1px solid var(--border-default);
      background: var(--bg-canvas);
    }

    .output-content {
      padding: 1.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.5;
      color: var(--text-secondary);
      overflow-y: auto;
      height: calc(100% - 40px);
    }

    /* IDE Scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-canvas);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-default);
      border: 2px solid var(--bg-canvas);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header class="pf-header"
    style="position: static; background: var(--bg-canvas); border-bottom: none; height: 48px; padding: 0 1rem;">
    <div class="pf-header__left">
      <a href="index.html" class="pf-logo">
        <i data-lucide="terminal" size="18" style="color: var(--accent-purple)"></i>
        <span style="font-size: 14px; font-weight: 600;">PromptFeed</span>
      </a>
      <span style="color: var(--text-muted); margin: 0 8px; font-size: 14px;">/</span>
      <a href="skills.html" style="font-size: 13px; color: var(--text-secondary); text-decoration: none;"
        class="hover:text-white">Agents</a>
      <span style="color: var(--text-muted); margin: 0 8px; font-size: 14px;">/</span>
      <span style="font-size: 13px; color: var(--text-primary); font-weight: 600;">Playground</span>

    </div>
    <div class="pf-header__right" style="gap: 8px;">
      <button id="save-btn" class="btn" style="padding: 4px 12px; font-size: 12px;">Save</button>
      <button id="publish-btn" class="btn btn-primary" style="padding: 4px 12px; font-size: 12px;">Deploy</button>
    </div>
  </header>

  <div class="ide-container">
    <!-- Activity Bar -->
    <aside class="ide-sidebar">
      <div class="ide-nav-item active"><i data-lucide="code-2" size="24"></i></div>
      <div class="ide-nav-item"><i data-lucide="search" size="24"></i></div>
      <div class="ide-nav-item"><i data-lucide="git-branch" size="24"></i></div>
      <div style="margin-top: auto;" class="ide-nav-item"><i data-lucide="settings" size="24"></i></div>
    </aside>

    <!-- Main Editor Panel -->
    <div class="ide-panel" style="flex: 1;">
      <div class="panel-header">
        <div style="display: flex; gap: 1rem; align-items: center;">
          <span class="panel-title">Editor</span>
          <div style="height: 12px; width: 1px; background: var(--border-default);"></div>
          <select id="model-select"
            style="background: transparent; border: none; color: var(--accent-blue); font-size: 12px; font-weight: 600; outline: none; cursor: pointer;">
            <option value="gpt-4o">GPT-4o (OpenAI)</option>
            <option value="claude-3-5-sonnet">Claude 3.5 Sonnet</option>
            <option value="gemini-1-5-pro">Gemini 1.5 Pro</option>
          </select>
        </div>
        <button id="run-btn" class="btn btn-primary"
          style="padding: 2px 12px; font-size: 11px; display: flex; align-items: center; gap: 4px;">
          <i data-lucide="play" size="12"></i> Run
        </button>
      </div>

      <div class="editor-container">
        <textarea id="prompt-editor" class="editor-textarea"
          placeholder="// Enter system instructions or prompt logic here..."></textarea>

        <div style="border-top: 1px solid var(--border-default); height: 200px; display: flex; flex-direction: column;">
          <div class="panel-header" style="height: 32px;">
            <span class="panel-title">Variables / Inputs</span>
          </div>
          <textarea id="user-input" class="editor-textarea" style="padding: 1rem; font-size: 12px;"
            placeholder='{ "input": "value" }'></textarea>
        </div>
      </div>
    </div>

    <!-- Output Panel -->
    <div class="ide-panel output-panel">
      <div class="panel-header">
        <span class="panel-title">Runtime Output</span>
        <span id="token-count" style="font-size: 10px; font-family: monospace; color: var(--text-muted);">0
          TOKENS</span>
      </div>
      <div id="output-stream" class="output-content">
        <span style="opacity: 0.3;">// Awaiting execution...</span>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/state.js"></script>
  <script src="js/pages/playground.js"></script>
</body>
</body>

</html>
