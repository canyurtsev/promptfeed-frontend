<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Playground — PromptFeed</title>
<meta name="description" content="Test and run AI prompts."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"/>
<link rel="stylesheet" href="pf-layout.css"/>
<link rel="icon" href="favicon.svg" type="image/svg+xml"/>
</head>
<body>

<header class="pf-topnav">
  <div class="pf-topnav__inner">
    <a href="index.html" class="pf-topnav__logo">
      <span class="pf-logo-text"><span class="pf-logo-prompt">Prompt</span><span class="pf-logo-feed">Feed</span><span class="pf-logo-dot">.</span></span>
    </a>
    <nav class="pf-topnav__nav" aria-label="Main navigation">
      <a href="index.html" class="pf-topnav__nav-link">News</a>
      <a href="community.html" class="pf-topnav__nav-link">Community</a>
      <a href="marketplace.html" class="pf-topnav__nav-link">Marketplace</a>
      <a href="benchmarks.html" class="pf-topnav__nav-link">Benchmarks</a>
      <a href="skill-library.html" class="pf-topnav__nav-link">Skills</a>
      <a href="bounty-board.html" class="pf-topnav__nav-link">Bounties</a>
      <a href="subscription.html" class="pf-topnav__nav-link">Pricing</a>
    </nav>
    <div class="pf-topnav__actions" id="nav-auth-area"></div>
  </div>
</header>

<div class="pg-container">
  <div class="pg-layout">
    
    <!-- Main Column: Playground -->
    <main class="pg-main" role="main">
      <div class="pg-header">
        <h1 class="pg-header__title">Playground</h1>
        <p class="pg-header__sub">Test and execute prompts with mocked AI backend response.</p>
      </div>

      <div class="pg-panel">
        <div class="pg-panel__body">
          
          <!-- Prompt Info (hidden until loaded) -->
          <div id="prompt-info" class="pg-prompt-info pg-hidden">
            <div id="prompt-media" class="pg-prompt-media"></div>
            <div class="pg-prompt-header">
              <h2 class="pg-prompt-title" id="prompt-title">Loading prompt...</h2>
              <div id="prompt-badge"></div>
            </div>
            <div class="pg-prompt-meta" id="prompt-meta"></div>
          </div>
          
          <!-- Error/Empty State -->
          <div id="prompt-error" class="pg-empty pg-hidden">
            <div class="pg-empty__icon"><span class="material-symbols-outlined" aria-hidden="true">warning</span></div>
            <h3 class="pg-empty__title" id="prompt-error-title">Error</h3>
            <p class="pg-empty__desc" id="prompt-error-desc">Could not load prompt.</p>
          </div>

          <!-- Input Area -->
          <div class="pg-input-wrapper">
            <label class="pg-label" for="prompt-input">Input Variables / Content</label>
            <textarea id="prompt-input" class="pg-textarea" placeholder="Enter input text or variables to inject into the prompt..."></textarea>
          </div>

          <!-- Run Actions -->
          <div class="pg-actions">
            <button id="btn-run" class="pf-btn pf-btn--primary pg-btn-run" disabled>
              <span class="material-symbols-outlined pg-btn-icon" aria-hidden="true">play_arrow</span>
              Run Prompt
            </button>
          </div>

          <!-- Output Area -->
          <div class="pg-output-wrapper">
            <label class="pg-label">Output</label>
            <div id="prompt-output" class="pg-output pg-output--empty">Output will appear here...</div>
          </div>

        </div>
      </div>
    </main>

    <!-- Side Column: History -->
    <aside class="pg-sidebar" aria-label="Execution History">
      <div class="pg-panel">
        <div class="pg-panel__header">
          <div class="pg-panel__title">
            <span class="material-symbols-outlined pg-panel__icon" aria-hidden="true">history</span>
            Recent Runs
          </div>
        </div>
        <div class="pg-history-list" id="executions-list">
          <!-- Injected via JS -->
          <div class="pg-history-msg">Loading history...</div>
        </div>
      </div>
    </aside>

  </div>
</div>

<script src="js/language-toggle.js" defer></script>
<script src="js/pages/playground.js" defer></script>
</body>
</html>
