<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PromptFeed - Tags</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&amp;family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "dark-bg": "#0d1117",
                        "dark-card": "#161b22",
                        "dark-border": "#30363d",
                        "dark-surface": "#21262d",
                        "accent": "#D4A373",
                        "accent-hover": "#BC8A5F",
                        "text-primary": "#f0f6fc",
                        "text-secondary": "#8b949e",
                        "text-muted": "#6e7681",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    }
                },
            },
        }
    </script>
    <style>
        body { background-color: #0d1117; color: #f0f6fc; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
  <link rel="icon" href="favicon.svg" type="image/svg+xml"/>
</head>

<body class="font-display min-h-screen flex flex-col">
    <header class="sticky top-0 z-50 w-full border-b border-dark-border bg-dark-card/95 backdrop-blur-md px-4 md:px-10 py-3">
        <div class="max-w-[1280px] mx-auto flex items-center justify-between gap-4">
            <div class="flex items-center gap-8">
                <a href="main-page.html" class="flex items-center gap-2 text-accent cursor-pointer">
                    <div class="size-8 bg-accent rounded flex items-center justify-center text-dark-bg">
                        <span class="material-symbols-outlined">terminal</span>
                    </div>
                    <h2 class="text-xl font-bold leading-tight tracking-tight text-text-primary">PromptFeed</h2>
                </a>
            </div>
            <div class="flex items-center gap-4">
                <nav class="hidden lg:flex items-center gap-6">
                    <a class="text-text-secondary hover:text-accent text-sm font-medium transition-colors" href="main-page.html">Home</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="max-w-[1280px] mx-auto px-4 md:px-10 py-12 flex-1 w-full">
        <div class="bg-dark-card rounded-xl border border-dark-border p-12 text-center flex flex-col items-center max-w-2xl mx-auto mt-10">
            <div class="size-20 bg-dark-surface rounded-full flex items-center justify-center text-accent mb-6 shadow-lg shadow-accent/10">
                <span class="material-symbols-outlined text-4xl">sell</span>
            </div>
            <h1 class="text-3xl font-bold text-text-primary tracking-tight mb-3">Tag Explorer</h1>
            <p class="text-text-secondary text-base leading-relaxed mb-8 max-w-md">
                Explore thousands of tags created by the community. A unified tag dictionary is being compiled and will be available.
            </p>
            <div class="flex gap-4 w-full">
                <a href="main-page.html" class="flex-1 py-3 bg-dark-surface hover:bg-dark-border border border-dark-border text-text-primary rounded-lg font-medium transition-all flex justify-center items-center gap-2 shadow-sm">
                    <span class="material-symbols-outlined text-sm">home</span> Back to Home
                </a>
                <a href="#" onclick="alert('Thanks for your interest!'); return false;" class="flex-1 py-3 bg-accent hover:bg-accent-hover text-dark-bg rounded-lg font-bold transition-all shadow-md shadow-accent/20">
                    Notify Me
                </a>
            </div>
        </div>
    </main>
</body>
</html>
