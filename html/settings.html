<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Settings - PromptFeed</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"/>
<link rel="stylesheet" href="pf-layout.css"/>
<link rel="icon" href="favicon.svg" type="image/svg+xml"/>
</head>
<body>

<header class="pf-topnav">
  <div class="pf-topnav__inner">
    <a href="index.html" class="pf-topnav__logo">
      <span class="pf-logo-text"><span class="pf-logo-prompt">Prompt</span><span class="pf-logo-feed">Feed</span><span class="pf-logo-dot">.</span></span>
    </a>
    <nav class="pf-topnav__nav" aria-label="Main">
      <a href="index.html" class="pf-topnav__nav-link" data-i18n="navNews">News</a>
      <a href="community.html" class="pf-topnav__nav-link" data-i18n="navCommunity">Community</a>
      <a href="marketplace.html" class="pf-topnav__nav-link" data-i18n="navMarketplace">Marketplace</a>
      <a href="benchmarks.html" class="pf-topnav__nav-link" data-i18n="navBenchmarks">Benchmarks</a>
      <a href="skill-library.html" class="pf-topnav__nav-link" data-i18n="navSkills">Skills</a>
      <a href="bounty-board.html" class="pf-topnav__nav-link" data-i18n="navBounties">Bounties</a>
      <a href="subscription.html" class="pf-topnav__nav-link" data-i18n="navPricing">Pricing</a>
      <a href="settings.html" class="pf-topnav__nav-link active" aria-current="page" data-i18n="navSettings">Settings</a>
    </nav>
  </div>
</header>

<main class="settings-shell">
  <section class="settings-panel" aria-labelledby="settings-title">
    <div class="settings-panel__header">
      <span class="material-symbols-outlined settings-panel__icon">settings</span>
      <div>
        <h1 id="settings-title" class="settings-panel__title" data-i18n="title">Settings</h1>
        <p class="settings-panel__subtitle" data-i18n="subtitle">Manage local preferences for this browser.</p>
      </div>
    </div>

    <div class="settings-row">
      <div class="settings-row__body">
        <h2 class="settings-row__title" data-i18n="languageTitle">Language</h2>
        <p class="settings-row__description" data-i18n="languageDescription">Choose the interface language for supported pages.</p>
      </div>
      <label class="settings-select-label" for="language-select" data-i18n="languageLabel">Language</label>
      <select id="language-select" class="settings-select" aria-describedby="language-note">
        <option value="en">English</option>
        <option value="tr">Turkish</option>
      </select>
    </div>

    <p class="settings-note" id="language-note" data-i18n="localNote">Language preference is saved locally. Full translation rollout coming soon.</p>
    <p class="settings-saved" id="settings-saved" role="status" aria-live="polite"></p>
  </section>
</main>

<script src="js/language-toggle.js" defer></script>
<script src="js/pages/settings.js" defer></script>
</body>
</html>
