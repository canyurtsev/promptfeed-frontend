<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sign in to PromptFeed</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&amp;family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "dark-bg": "#0d1117",
                        "dark-card": "#161b22",
                        "dark-border": "#30363d",
                        "dark-surface": "#21262d",
                        "accent": "#D4A373",
                        "accent-hover": "#BC8A5F",
                        "text-primary": "#f0f6fc",
                        "text-secondary": "#8b949e",
                        "text-muted": "#6e7681",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        body {
            background-color: #0d1117;
            color: #f0f6fc;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
  <link rel="icon" href="favicon.svg" type="image/svg+xml"/>
</head>

<body class="font-display min-h-screen flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-[340px] flex flex-col items-center">
        <div class="mb-6 flex flex-col items-center gap-2">
            <div
                class="size-12 bg-accent rounded-xl flex items-center justify-center text-dark-bg shadow-lg shadow-accent/20">
                <span class="material-symbols-outlined text-3xl">terminal</span>
            </div>
            <h1 class="text-2xl font-light tracking-tight text-text-primary mt-4">Sign in to PromptFeed</h1>
        </div>
        <div class="w-full bg-dark-card rounded-lg border border-dark-border p-5">
            <form id="login-form" class="flex flex-col gap-4">
                <div class="flex flex-col gap-2">
                    <label class="text-sm font-medium text-text-primary" for="login_field">Username or email
                        address</label>
                    <input autocomplete="username"
                        class="block w-full rounded-md border-dark-border bg-dark-surface px-3 py-1.5 text-sm text-text-primary focus:border-accent focus:ring-1 focus:ring-accent outline-none transition-all"
                        id="login_field" name="login" type="text" required />
                </div>
                <div class="flex flex-col gap-2">
                    <div class="flex justify-between items-center">
                        <label class="text-sm font-medium text-text-primary" for="password">Password</label>
                        <a class="text-xs text-text-secondary hover:text-accent hover:underline" href="legal-page.html?type=contact">Forgot
                            password?</a>
                    </div>
                    <input autocomplete="current-password"
                        class="block w-full rounded-md border-dark-border bg-dark-surface px-3 py-1.5 text-sm text-text-primary focus:border-accent focus:ring-1 focus:ring-accent outline-none transition-all"
                        id="password" name="password" type="password" required />
                </div>
                <button
                    class="mt-2 w-full bg-accent hover:bg-accent-hover text-dark-bg font-semibold py-2 rounded-md transition-colors text-sm flex justify-center items-center"
                    type="submit" id="submit-btn">
                    Sign in
                </button>
                <p id="error-message" class="text-red-500 text-xs hidden text-center"></p>
            </form>
        </div>
        <div class="w-full flex items-center gap-3 my-4">
            <div class="h-px flex-1 bg-dark-border"></div>
            <span class="text-xs text-text-muted font-medium">or</span>
            <div class="h-px flex-1 bg-dark-border"></div>
        </div>
        <div class="w-full flex flex-col gap-2">
            <button id="google-login-btn"
                class="w-full flex items-center justify-center gap-2 border border-dark-border bg-dark-card hover:bg-dark-surface py-2 rounded-md transition-all text-sm font-medium text-text-primary">
                <svg class="w-4 h-4" viewBox="0 0 24 24">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4"></path>
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853"></path>
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                        fill="#FBBC05"></path>
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335"></path>
                </svg>
                Continue with Google
            </button>
            <button id="apple-login-btn"
                class="w-full flex items-center justify-center gap-2 border border-dark-border bg-dark-card hover:bg-dark-surface py-2 rounded-md transition-all text-sm font-medium text-text-primary">
                <svg class="w-4 h-4 fill-text-primary" viewBox="0 0 384 512">
                    <path
                        d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z">
                    </path>
                </svg>
                Continue with Apple
            </button>
        </div>
        <div class="mt-6 w-full py-4 border border-dark-border rounded-lg flex justify-center bg-dark-card">
            <p class="text-sm text-text-secondary">
                New to PromptFeed? <a id="create-account-link" class="text-accent font-semibold hover:underline cursor-pointer">Create an
                    account</a>
            </p>
        </div>
        <div class="mt-8 flex gap-4 text-[11px] text-text-muted font-medium uppercase tracking-wider">
            <a class="hover:text-accent" href="legal-page.html?type=terms">Terms</a>
            <a class="hover:text-accent" href="legal-page.html?type=privacy">Privacy</a>
            <a class="hover:text-accent" href="legal-page.html?type=privacy">Security</a>
            <a class="hover:text-accent" href="legal-page.html?type=contact">Contact</a>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');
        const submitBtn = document.getElementById('submit-btn');

        // Social login buttons — coming soon
        const showSocialComingSoon = () => {
            const toast = document.createElement('div');
            toast.textContent = '🚧 Social login coming soon!';
            toast.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#21262d;color:#f0f6fc;border:1px solid #30363d;padding:10px 18px;border-radius:8px;font-size:14px;z-index:9999;';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        };
        
        document.getElementById('google-login-btn').onclick = showSocialComingSoon;
        document.getElementById('apple-login-btn').onclick = showSocialComingSoon;

        // "Create an account" link — show inline form
        document.getElementById('create-account-link').onclick = (e) => {
            e.preventDefault();
            showRegisterForm();
        };

        let registerMode = false;

        function showRegisterForm() {
            registerMode = true;
            document.querySelector('h1').textContent = 'Create an account';
            const form = document.getElementById('login-form');

            // Add username field if not present
            if (!document.getElementById('username_field')) {
                const usernameDiv = document.createElement('div');
                usernameDiv.className = 'flex flex-col gap-2';
                usernameDiv.innerHTML = `
                    <label class="text-sm font-medium text-text-primary" for="username_field">Username</label>
                    <input id="username_field" name="username" type="text" required
                        class="block w-full rounded-md border-dark-border bg-dark-surface px-3 py-1.5 text-sm text-text-primary focus:border-accent focus:ring-1 focus:ring-accent outline-none transition-all">
                `;
                form.insertBefore(usernameDiv, form.firstChild);
            }

            // Change email label
            const loginLabel = document.querySelector('[for="login_field"]');
            if (loginLabel) loginLabel.textContent = 'Email address';

            document.getElementById('submit-btn').textContent = 'Create account';
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMessage.classList.add('hidden');
            errorMessage.innerText = '';

            const originalBtnText = submitBtn.innerText;
            submitBtn.disabled = true;
            submitBtn.textContent = registerMode ? 'Creating account...' : 'Signing in...';

            const login = document.getElementById('login_field').value;
            const password = document.getElementById('password').value;

            try {
                if (registerMode) {
                    const username = document.getElementById('username_field')?.value;
                    const response = await fetch('http://localhost:5000/api/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, email: login, password })
                    });
                    const data = await response.json();
                    if (data.success) {
                        localStorage.setItem('accessToken', data.data.accessToken);
                        localStorage.setItem('refreshToken', data.data.refreshToken);
                        localStorage.setItem('user', JSON.stringify(data.data.user));
                        window.location.href = 'main-page.html';
                    } else {
                        errorMessage.innerText = data.message || 'Registration failed';
                        errorMessage.classList.remove('hidden');
                    }
                } else {
                    const response = await fetch('http://localhost:5000/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ emailOrUsername: login, password })
                    });
                    const data = await response.json();
                    if (data.success) {
                        localStorage.setItem('accessToken', data.data.accessToken);
                        localStorage.setItem('refreshToken', data.data.refreshToken);
                        localStorage.setItem('user', JSON.stringify(data.data.user));
                        window.location.href = 'main-page.html';
                    } else {
                        errorMessage.innerText = data.message || 'Login failed';
                        errorMessage.classList.remove('hidden');
                    }
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMessage.innerText = 'Connection error. Is the backend running?';
                errorMessage.classList.remove('hidden');
            } finally {
                submitBtn.innerText = originalBtnText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
